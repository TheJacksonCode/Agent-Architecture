<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Architecture Designer v3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050A14;--bg2:#0C1425;--bg3:#111E33;--bg4:#0F1929;
--amber:#F5A623;--teal:#2DD4A0;--red:#E85D75;--blue:#5B8DEF;--purple:#A78BFA;
--t1:#E8E0D6;--t2:#9B8E82;--t3:#6B6058;--t4:#4A4038;
--border:#1A2540;
--hd:'Space Grotesk',sans-serif;--bd:'Inter',sans-serif;--mn:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--bd);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(245,166,35,.2);border-radius:2px}

/* ================================================================
   TOP BAR
   ================================================================ */
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:rgba(12,20,37,.95);border-bottom:1px solid rgba(245,166,35,.08);z-index:100;flex-shrink:0}
.topbar-brand{font-family:var(--hd);font-size:13px;font-weight:700;color:var(--amber);white-space:nowrap}
.topbar-problem{flex:1;display:flex;align-items:center;gap:8px}
.topbar-problem textarea{flex:1;height:36px;padding:6px 12px;border:1px solid rgba(245,166,35,.12);border-radius:8px;background:rgba(5,10,20,.6);color:var(--t1);font-family:var(--bd);font-size:12px;resize:none;outline:none;transition:border-color .2s}
.topbar-problem textarea:focus{border-color:rgba(245,166,35,.4)}
.topbar-problem textarea::placeholder{color:var(--t3)}
.topbar-actions{display:flex;gap:6px;flex-shrink:0}
.btn{padding:7px 14px;border-radius:7px;font-family:var(--hd);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid}
.btn-amber{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.08);color:var(--amber)}
.btn-amber:hover{background:rgba(245,166,35,.18)}
.btn-teal{border-color:rgba(45,212,160,.3);background:rgba(45,212,160,.08);color:var(--teal)}
.btn-teal:hover{background:rgba(45,212,160,.18)}
.btn-red{border-color:rgba(232,93,117,.3);background:rgba(232,93,117,.08);color:var(--red)}
.btn-red:hover{background:rgba(232,93,117,.18)}
.btn-big{padding:9px 20px;font-size:12px}

/* ================================================================
   MAIN LAYOUT: LEFT PALETTE | CANVAS | RIGHT DETAILS
   ================================================================ */
.app-layout{display:flex;flex:1;overflow:hidden}

/* LEFT: PALETTE */
.palette{width:260px;flex-shrink:0;background:rgba(8,14,26,.95);border-right:1px solid rgba(245,166,35,.06);display:flex;flex-direction:column;overflow:hidden}
.palette-header{padding:10px 14px;border-bottom:1px solid rgba(245,166,35,.06);display:flex;justify-content:space-between;align-items:center}
.palette-header h3{font-family:var(--hd);font-size:13px;font-weight:700;color:var(--teal)}
.palette-search{margin:8px 10px;padding:6px 10px;border:1px solid rgba(155,142,130,.1);border-radius:6px;background:rgba(5,10,20,.5);color:var(--t1);font-size:11px;outline:none}
.palette-search:focus{border-color:rgba(45,212,160,.3)}
.palette-scroll{flex:1;overflow-y:auto;padding:4px 0;min-height:0}
.pal-cat{padding:6px 14px;font-family:var(--mn);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-top:4px}
.pal-agent{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:grab;transition:all .15s;border-left:2px solid transparent;user-select:none}
.pal-agent:hover{background:rgba(45,212,160,.03);border-left-color:var(--teal)}
.pal-agent:active{cursor:grabbing}
.pal-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:1.5px solid rgba(155,142,130,.15);background:rgba(5,10,20,.5);flex-shrink:0}
.pal-info{flex:1;min-width:0}
.pal-name{font-family:var(--hd);font-size:11px;font-weight:600;color:var(--t1)}
.pal-role{font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pal-model{font-family:var(--mn);font-size:8px;padding:1px 5px;border-radius:3px}
.m-opus{background:rgba(245,166,35,.08);color:var(--amber)}.m-sonnet{background:rgba(45,212,160,.08);color:var(--teal)}.m-haiku{background:rgba(91,141,239,.08);color:var(--blue)}

/* Preset section */
.preset-section{padding:6px 8px;border-top:1px solid rgba(245,166,35,.08);max-height:280px;overflow-y:auto;flex-shrink:0}
.preset-section-title{font-family:var(--mn);font-size:8px;color:var(--t3);letter-spacing:.1em;margin-bottom:4px;padding:0 2px;display:flex;justify-content:space-between;align-items:center}
.preset-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:5px 8px;margin-bottom:3px;border:1px solid rgba(155,142,130,.06);border-radius:6px;background:rgba(5,10,20,.3);color:var(--t2);font-family:var(--hd);font-size:10px;cursor:pointer;transition:all .15s;text-align:left;gap:4px}
.preset-btn:hover{border-color:rgba(245,166,35,.2);color:var(--amber);background:rgba(245,166,35,.03)}
.preset-btn.active{border-color:rgba(245,166,35,.35);color:var(--amber);background:rgba(245,166,35,.05)}
.pb-icon{font-size:12px;flex-shrink:0;width:16px;text-align:center}
.pb-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-meta{font-family:var(--mn);font-size:8px;color:var(--t3);flex-shrink:0;white-space:nowrap}

/* ================================================================
   CENTER: CANVAS
   ================================================================ */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.canvas-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(245,166,35,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
#connectionSvg{position:absolute;inset:0;z-index:1;pointer-events:none}
#connectionSvg line{transition:stroke .2s}
#connectionSvg .conn-hit{stroke:transparent;stroke-width:12;pointer-events:stroke;cursor:pointer}

/* Canvas nodes */
.c-node{position:absolute;z-index:10;cursor:grab;user-select:none;transition:box-shadow .2s}
.c-node:active{cursor:grabbing;z-index:20}
.c-node.selected{z-index:15}
.c-node-inner{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px 6px;border-radius:12px;border:1.5px solid rgba(155,142,130,.12);background:rgba(12,20,37,.9);backdrop-filter:blur(8px);min-width:72px;transition:all .2s}
.c-node:hover .c-node-inner{border-color:rgba(245,166,35,.3);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.c-node.selected .c-node-inner{border-color:var(--amber);box-shadow:0 0 20px rgba(245,166,35,.2)}
.c-node-orb{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid;position:relative}
.c-node-label{font-family:var(--hd);font-size:9px;font-weight:600;text-align:center;max-width:70px;line-height:1.2}
.c-node-model{font-family:var(--mn);font-size:7px;padding:1px 4px;border-radius:2px;margin-top:1px}
.c-node-load{width:36px;height:3px;border-radius:2px;background:rgba(155,142,130,.1);margin-top:2px;overflow:hidden}
.c-node-load-fill{height:100%;border-radius:2px}

/* Node colors */
.nc-amber .c-node-orb{border-color:rgba(245,166,35,.5);background:radial-gradient(circle,rgba(245,166,35,.12),rgba(245,166,35,.03));box-shadow:0 0 15px rgba(245,166,35,.15)}
.nc-amber .c-node-label{color:var(--amber)}
.nc-teal .c-node-orb{border-color:rgba(45,212,160,.4);background:radial-gradient(circle,rgba(45,212,160,.1),rgba(45,212,160,.02));box-shadow:0 0 12px rgba(45,212,160,.1)}
.nc-teal .c-node-label{color:var(--teal)}
.nc-blue .c-node-orb{border-color:rgba(91,141,239,.4);background:radial-gradient(circle,rgba(91,141,239,.1),rgba(91,141,239,.02));box-shadow:0 0 12px rgba(91,141,239,.1)}
.nc-blue .c-node-label{color:var(--blue)}
.nc-muted .c-node-orb{border-color:rgba(155,142,130,.2);background:radial-gradient(circle,rgba(155,142,130,.04),transparent)}
.nc-muted .c-node-label{color:var(--t2)}
.nc-red .c-node-orb{border-color:rgba(232,93,117,.4);background:radial-gradient(circle,rgba(232,93,117,.1),rgba(232,93,117,.02));box-shadow:0 0 12px rgba(232,93,117,.1)}
.nc-red .c-node-label{color:var(--red)}
.nc-purple .c-node-orb{border-color:rgba(167,139,250,.4);background:radial-gradient(circle,rgba(167,139,250,.1),rgba(167,139,250,.02));box-shadow:0 0 12px rgba(167,139,250,.1)}
.nc-purple .c-node-label{color:var(--purple)}

/* Connection anchor dots */
.c-node-anchor{position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(245,166,35,.3);border:1px solid rgba(245,166,35,.5);cursor:crosshair;opacity:0;transition:opacity .2s;z-index:5}
.c-node:hover .c-node-anchor{opacity:1}
.c-node-anchor.top{top:-5px;left:50%;transform:translateX(-50%)}
.c-node-anchor.bottom{bottom:-5px;left:50%;transform:translateX(-50%)}
.c-node-anchor:hover{background:var(--amber);transform:translateX(-50%) scale(1.3)}

/* Canvas toolbar */
.canvas-toolbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50;padding:6px 10px;background:rgba(12,20,37,.9);border:1px solid rgba(245,166,35,.1);border-radius:10px;backdrop-filter:blur(10px)}
.canvas-toolbar .btn{padding:5px 12px;font-size:10px}
.canvas-info{position:absolute;top:10px;left:10px;font-family:var(--mn);font-size:9px;color:var(--t3);z-index:5;pointer-events:none}

/* ================================================================
   RIGHT: DETAILS PANEL
   ================================================================ */
.details{width:320px;flex-shrink:0;background:rgba(8,14,26,.95);border-left:1px solid rgba(245,166,35,.06);display:flex;flex-direction:column;overflow:hidden}
.details-header{padding:10px 14px;border-bottom:1px solid rgba(245,166,35,.06)}
.details-header h3{font-family:var(--hd);font-size:13px;font-weight:700;color:var(--amber)}
.details-scroll{flex:1;overflow-y:auto;padding:12px}
.details-empty{padding:40px 20px;text-align:center;color:var(--t3);font-size:12px}

/* Detail sections */
.det-section{margin-bottom:14px}
.det-label{font-family:var(--mn);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.det-value{font-size:13px;color:var(--t2);line-height:1.6}
.det-card{padding:10px 12px;border:1px solid rgba(155,142,130,.08);border-radius:8px;background:rgba(5,10,20,.4);margin-bottom:8px}
.det-card h4{font-family:var(--hd);font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.det-card p{font-size:11px;color:var(--t2);line-height:1.6}

/* Model selector in details */
.det-models{display:flex;gap:4px;margin-top:6px}
.det-model{flex:1;padding:6px;border:1.5px solid rgba(155,142,130,.08);border-radius:6px;text-align:center;cursor:pointer;transition:all .15s;background:rgba(5,10,20,.3)}
.det-model:hover{border-color:rgba(245,166,35,.2)}
.det-model.active{box-shadow:0 0 8px rgba(245,166,35,.1)}
.det-model.act-opus{border-color:rgba(245,166,35,.5);background:rgba(245,166,35,.05)}
.det-model.act-sonnet{border-color:rgba(45,212,160,.5);background:rgba(45,212,160,.05)}
.det-model.act-haiku{border-color:rgba(91,141,239,.5);background:rgba(91,141,239,.05)}
.det-model-name{font-family:var(--hd);font-size:11px;font-weight:700}
.det-model-cost{font-family:var(--mn);font-size:8px;color:var(--t3)}

/* Prompt textarea in details */
.det-prompt{width:100%;min-height:180px;padding:10px;border:1px solid rgba(245,166,35,.1);border-radius:8px;background:rgba(0,0,0,.2);color:var(--t2);font-family:var(--mn);font-size:11px;line-height:1.6;resize:vertical;outline:none;transition:border-color .2s}
.det-prompt:focus{border-color:rgba(245,166,35,.35)}

/* Connections list */
.det-conn{display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid rgba(155,142,130,.06);border-radius:6px;margin-bottom:3px;font-size:11px;color:var(--t2)}
.det-conn-arrow{color:var(--amber);font-weight:700;font-size:14px}
.det-conn-del{margin-left:auto;cursor:pointer;color:var(--t3);font-size:12px;transition:color .2s}
.det-conn-del:hover{color:var(--red)}

/* Preset info in details panel */
.pi-badge{font-family:var(--mn);font-size:11px;color:var(--amber);padding:4px 10px;border:1px solid rgba(245,166,35,.15);border-radius:6px;display:inline-block;background:rgba(245,166,35,.03)}
.pi-cost-row{display:flex;gap:12px;margin:6px 0}
.pi-cost-val{font-family:var(--mn);font-size:13px;font-weight:600}
.pi-list{list-style:none;padding:0;margin:0}
.pi-list li{font-size:11px;margin:3px 0;padding:2px 0}
.pi-pro{color:var(--teal)}.pi-con{color:var(--red)}
.pi-hint{margin-top:12px;font-size:10px;color:var(--t3);padding:8px;border:1px solid rgba(155,142,130,.06);border-radius:6px;background:rgba(5,10,20,.3);line-height:1.5}

/* ================================================================
   FINAL PROMPT MODAL
   ================================================================ */
.modal-overlay{position:fixed;inset:0;background:rgba(5,10,20,.85);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{width:90%;max-width:800px;max-height:85vh;background:rgba(12,20,37,.98);border:1px solid rgba(245,166,35,.2);border-radius:16px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.modal-header{padding:16px 20px;border-bottom:1px solid rgba(245,166,35,.08);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-family:var(--hd);font-size:18px;font-weight:700;color:var(--amber)}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-body textarea{width:100%;min-height:400px;padding:16px;border:1px solid rgba(245,166,35,.1);border-radius:10px;background:rgba(0,0,0,.25);color:var(--t1);font-family:var(--mn);font-size:12px;line-height:1.7;resize:vertical;outline:none}
.modal-footer{padding:12px 20px;border-top:1px solid rgba(245,166,35,.08);display:flex;justify-content:flex-end;gap:8px}

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media(max-width:1100px){.details{width:260px}}
@media(max-width:900px){.palette{width:200px}.details{width:220px}}
@media(max-width:700px){.palette{display:none}.details{display:none}.canvas-wrap{width:100%}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">&#9734; Agent Designer</div>
  <div class="topbar-problem">
    <textarea id="problemInput" placeholder="Opisz swoj problem / case / projekt tutaj... np. 'Chce stworzyc SaaS dashboard do analizy danych z Next.js + Supabase'"></textarea>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-teal" onclick="generateFinalPrompt()">&#9889; Generuj Final Prompt</button>
    <button class="btn btn-amber" onclick="saveCase()">&#128190; Zapisz</button>
    <button class="btn btn-red" onclick="clearCanvas()">&#128465; Wyczysc</button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="app-layout">

  <!-- LEFT: AGENT PALETTE -->
  <div class="palette" id="palette">
    <div class="palette-header"><h3>&#129302; Agenci</h3><span style="font-size:9px;color:var(--t3)">PRZECIAGNIJ</span></div>
    <input class="palette-search" id="paletteSearch" placeholder="&#128269; Szukaj agenta..." oninput="filterPalette()">
    <div class="palette-scroll" id="paletteScroll"></div>
    <div class="preset-section" id="presetSection">
      <div class="preset-section-title"><span>PRESETY</span><span id="presetCount">15</span></div>
      <!-- Preset buttons rendered by JS -->
    </div>
  </div>

  <!-- CENTER: CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas-grid"></div>
    <svg id="connectionSvg"></svg>
    <div class="canvas-info" id="canvasInfo">Agentow: 0 | Polaczen: 0</div>
    <div class="canvas-toolbar">
      <button class="btn btn-amber" id="connectModeBtn" onclick="toggleConnectMode()">&#128279; Polacz</button>
      <button class="btn btn-red" onclick="deleteSelected()">&#128465; Usun zaznaczone</button>
    </div>
    <!-- Nodes rendered here dynamically -->
  </div>

  <!-- RIGHT: DETAILS -->
  <div class="details" id="detailsPanel">
    <div class="details-header"><h3>&#128203; Szczegoly</h3></div>
    <div class="details-scroll" id="detailsScroll">
      <div class="details-empty">Kliknij agenta na canvasie lub w palecie, aby zobaczyc szczegoly.<br><br>Przeciagnij agentow z lewego panelu na canvas.</div>
    </div>
  </div>
</div>

<!-- FINAL PROMPT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h2>&#9889; Final Prompt do Claude Code</h2><button class="btn btn-red" onclick="closeModal()">&#10005; Zamknij</button></div>
    <div class="modal-body"><textarea id="finalPromptArea" readonly></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-amber btn-big" onclick="copyFinalPrompt()">&#128203; Kopiuj do schowka</button>
      <button class="btn btn-teal btn-big" onclick="closeModal()">Gotowe</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// AGENT DEFINITIONS (palette data)
// ================================================================
const AGENT_DEFS = [
  // STRATEGY
  { cat:'STRATEGIA', id:'orchestrator', name:'Orkiestrator', icon:'\u2734', color:'amber', model:'opus', load:50,
    role:'Centralny punkt decyzyjny. Analizuje zadanie, dekomponuje, deleguje, syntetyzuje wyniki.',
    tools:'Agent (sub-agenty), Read/Write, Bash, TaskCreate',
    prompt:'Jestes Master Orkiestratorem. NIE generujesz tresci - ZARZADZASZ SYSTEMEM.\n\nTWOJE OBOWIAZKI:\n1. Dekompozycja zadania na podzadania\n2. Delegowanie do wyspecjalizowanych agentow\n3. Kontrola gate\'ow miedzy fazami\n4. Synteza wynikow i rozwiazywanie konfliktow\n5. GO/NO-GO decisions\n\nZASADY:\n- Kazdy agent dostaje TYLKO swoj kontekst\n- MANIFEST.md jako shared scratchpad\n- Max 10 krokow sekwencyjnych\n- Eskaluj do uzytkownika decyzje krytyczne',
    connType:'source' },
  { cat:'STRATEGIA', id:'synthesizer', name:'Syntetyk', icon:'\u26A1', color:'purple', model:'sonnet', load:65,
    role:'Pamiec cross-fazowa. Utrzymuje MANIFEST.md. Syntetyzuje wyniki miedzy fazami.',
    tools:'Read/Write (MANIFEST.md)',
    prompt:'Jestes Syntetykiem - "pamiec systemu". Utrzymujesz MANIFEST.md.\n\nPo kazdej fazie:\n1. Zbierz kluczowe wyniki\n2. Zaktualizuj sekcje w MANIFEST.md:\n   - Decyzje Architektoniczne\n   - Stack Technologiczny\n   - Design System\n   - Known Risks\n   - Reference Materials\n3. Wyciagnij wnioski cross-fazowe\n4. Oznacz sprzecznosci miedzy agentami',
    connType:'both' },

  // PLANNING
  { cat:'PLANOWANIE', id:'analyst', name:'Analityk', icon:'\u269B', color:'teal', model:'sonnet', load:55,
    role:'Dekompozycja zlozonych problemow na niezalezne podzadania z zaleznosami.',
    tools:'Read (wymagania), Write (plan dekompozycji)',
    prompt:'Jestes Analitykiem. Rozloz problem na NIEZALEZNE podzadania.\n\nDla kazdego podzadania okresl:\n1. Zakres funkcjonalny\n2. Co wymaga researchu vs implementacji\n3. Wymagania techniczne i UX/designowe\n4. Zaleznosci od innych podzadan\n5. Zlozonosc: S/M/L/XL\n\nOutput: strukturalny plan w Markdown.',
    connType:'both' },
  { cat:'PLANOWANIE', id:'planner', name:'Planer', icon:'\u2699', color:'teal', model:'sonnet', load:40,
    role:'Harmonogram operacji. Co rownolegle, co sekwencyjne, sciezka krytyczna.',
    tools:'Read (plan analityka), Write (harmonogram)',
    prompt:'Jestes Planerem. Na podstawie dekompozycji Analityka:\n\n1. Co moze biec ROWNOLEGLE\n2. Co jest SEKWENCYJNE (z zaleznosci)\n3. Punkty synchronizacji (gate\'y)\n4. Estymacja czasu na faze\n5. Sciezka krytyczna\n\nOutput: harmonogram timeline z gate\'ami.',
    connType:'both' },

  // RESEARCH
  { cat:'RESEARCH', id:'res_tech', name:'Researcher Tech', icon:'\uD83D\uDD0D', color:'blue', model:'haiku', load:55,

// Auto-inject model info into prompts
const MODEL_INFO = {
  opus: '[MODEL: Claude Opus 4.6 | 1M context | Cena: $15/$75 per 1M tokenow in/out]',
  sonnet: '[MODEL: Claude Sonnet 4.6 | 200K context | Cena: $3/$15 per 1M tokenow in/out]',
  haiku: '[MODEL: Claude Haiku 4.5 | 200K context | Cena: $0.80/$4 per 1M tokenow in/out]'
};
AGENT_DEFS.forEach(def => {
  def.prompt = MODEL_INFO[def.model] + '\n\n' + def.prompt;
});

// ================================================================
// STATE
// ================================================================
let nodes = []; // { id, defId, x, y, model, customPrompt }
let connections = []; // { id, fromId, toId, type:'one'|'two'|'continuous' }
let selectedNodeId = null;
let connectMode = false;
let connectFrom = null;
let dragging = null;
let dragOff = { x:0, y:0 };
let idCounter = 0;
let activePresetId = null;

// ================================================================
// RENDER PALETTE
// ================================================================
function renderPalette() {
  const scroll = document.getElementById('paletteScroll');
  let html = '', lastCat = '';
  AGENT_DEFS.forEach(def => {
    if (def.cat !== lastCat) { html += `<div class="pal-cat">${def.cat}</div>`; lastCat = def.cat; }
    const mc = def.model === 'opus' ? 'm-opus' : def.model === 'sonnet' ? 'm-sonnet' : 'm-haiku';
    html += `<div class="pal-agent" data-def-id="${def.id}" draggable="true" ondragstart="onPalDragStart(event,'${def.id}')" onclick="showDefDetails('${def.id}')">
      <div class="pal-icon">${def.icon}</div>
      <div class="pal-info"><div class="pal-name">${def.name}</div><div class="pal-role">${def.role.substring(0,40)}...</div></div>
      <span class="pal-model ${mc}">${def.model.toUpperCase()}</span>
    </div>`;
  });
  scroll.innerHTML = html;
}

function filterPalette() {
  const q = document.getElementById('paletteSearch').value.toLowerCase();
  document.querySelectorAll('.pal-agent').forEach(el => {
    const name = el.querySelector('.pal-name').textContent.toLowerCase();
    const role = el.querySelector('.pal-role').textContent.toLowerCase();
    el.style.display = (name.includes(q) || role.includes(q)) ? '' : 'none';
  });
}

// ================================================================
// DRAG FROM PALETTE TO CANVAS
// ================================================================
function onPalDragStart(e, defId) {
  e.dataTransfer.setData('defId', defId);
}
const canvasWrap = document.getElementById('canvasWrap');
canvasWrap.addEventListener('dragover', e => e.preventDefault());
canvasWrap.addEventListener('drop', e => {
  e.preventDefault();
  const defId = e.dataTransfer.getData('defId');
  if (!defId) return;
  const rect = canvasWrap.getBoundingClientRect();
  addNodeFromDef(defId, e.clientX - rect.left - 36, e.clientY - rect.top - 30);
});

function addNodeFromDef(defId, x, y) {
  const def = AGENT_DEFS.find(d => d.id === defId);
  if (!def) return;
  const id = 'n' + (idCounter++);
  nodes.push({ id, defId, x: Math.max(10,x), y: Math.max(10,y), model: def.model, customPrompt: def.prompt });
  renderNodes();
  selectNode(id);
  updateInfo();
}

// ================================================================
// RENDER CANVAS NODES
// ================================================================
function renderNodes() {
  // Remove old nodes
  canvasWrap.querySelectorAll('.c-node').forEach(el => el.remove());
  nodes.forEach(node => {
    const def = AGENT_DEFS.find(d => d.id === node.defId);
    if (!def) return;
    const colorClass = { amber:'nc-amber', teal:'nc-teal', blue:'nc-blue', muted:'nc-muted', red:'nc-red', purple:'nc-purple' }[def.color] || 'nc-muted';
    const mc = node.model === 'opus' ? 'm-opus' : node.model === 'sonnet' ? 'm-sonnet' : 'm-haiku';
    const load = def.load + (node.model === 'haiku' ? 10 : node.model === 'opus' ? -15 : 0);
    const loadColor = load >= 80 ? 'var(--red)' : load >= 55 ? 'var(--amber)' : 'var(--teal)';

    const el = document.createElement('div');
    el.className = `c-node ${colorClass}` + (node.id === selectedNodeId ? ' selected' : '');
    el.id = node.id;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.innerHTML = `
      <div class="c-node-anchor top" data-node="${node.id}" data-pos="top"></div>
      <div class="c-node-inner">
        <div class="c-node-orb">${def.icon}</div>
        <div class="c-node-label">${def.name}</div>
        <span class="c-node-model ${mc}">${node.model.toUpperCase()}</span>
        <div class="c-node-load"><div class="c-node-load-fill" style="width:${Math.min(100,load)}%;background:${loadColor}"></div></div>
      </div>
      <div class="c-node-anchor bottom" data-node="${node.id}" data-pos="bottom"></div>`;

    // Mouse events for drag
    el.addEventListener('mousedown', e => {
      if (e.target.classList.contains('c-node-anchor')) {
        onAnchorClick(node.id);
        return;
      }
      if (connectMode) { onAnchorClick(node.id); return; }
      dragging = node;
      dragOff.x = e.clientX - node.x;
      dragOff.y = e.clientY - node.y;
      e.preventDefault();
    });
    el.addEventListener('click', e => {
      if (!connectMode) selectNode(node.id);
    });

    canvasWrap.appendChild(el);
  });
  renderConnections();
}

// ================================================================
// DRAG NODES ON CANVAS
// ================================================================
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = canvasWrap.getBoundingClientRect();
  dragging.x = Math.max(0, Math.min(rect.width - 80, e.clientX - dragOff.x));
  dragging.y = Math.max(0, Math.min(rect.height - 80, e.clientY - dragOff.y));
  const el = document.getElementById(dragging.id);
  if (el) { el.style.left = dragging.x + 'px'; el.style.top = dragging.y + 'px'; }
  renderConnections();
});
document.addEventListener('mouseup', () => { dragging = null; });

// ================================================================
// CONNECTIONS (SVG with arrows)
// ================================================================
function onAnchorClick(nodeId) {
  if (!connectFrom) {
    connectFrom = nodeId;
    document.getElementById(nodeId)?.classList.add('selected');
  } else if (connectFrom !== nodeId) {
    // Check if connection exists
    const exists = connections.some(c => (c.fromId===connectFrom && c.toId===nodeId) || (c.fromId===nodeId && c.toId===connectFrom));
    if (!exists) {
      connections.push({ id:'c'+(idCounter++), fromId:connectFrom, toId:nodeId, type:'one' });
      renderConnections();
      updateInfo();
    }
    document.getElementById(connectFrom)?.classList.remove('selected');
    connectFrom = null;
    if (!connectMode) connectMode = false;
  }
}

function toggleConnectMode() {
  connectMode = !connectMode;
  connectFrom = null;
  const btn = document.getElementById('connectModeBtn');
  btn.textContent = connectMode ? '\uD83D\uDD17 Kliknij 2 agentow...' : '\uD83D\uDD17 Polacz';
  btn.style.background = connectMode ? 'rgba(245,166,35,.2)' : '';
}

function renderConnections() {
  const svg = document.getElementById('connectionSvg');
  const rect = canvasWrap.getBoundingClientRect();
  svg.setAttribute('width', rect.width);
  svg.setAttribute('height', rect.height);

  // Arrow marker defs
  let html = `<defs>
    <marker id="arrowOne" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(245,166,35,.6)"/></marker>
    <marker id="arrowTwo" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="rgba(45,212,160,.6)"/></marker>
    <marker id="arrowCont" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(167,139,250,.6)"/></marker>
  </defs>`;

  connections.forEach(conn => {
    const from = nodes.find(n => n.id === conn.fromId);
    const to = nodes.find(n => n.id === conn.toId);
    if (!from || !to) return;

    const x1 = from.x + 36, y1 = from.y + 40;
    const x2 = to.x + 36, y2 = to.y + 10;

    const colors = { one:'rgba(245,166,35,.35)', two:'rgba(45,212,160,.35)', continuous:'rgba(167,139,250,.35)' };
    const markers = { one:'url(#arrowOne)', two:'url(#arrowTwo)', continuous:'url(#arrowCont)' };
    const color = colors[conn.type] || colors.one;
    const dashArray = conn.type === 'continuous' ? '' : '6 4';
    const marker = markers[conn.type] || markers.one;

    // Curved line
    const mx = (x1+x2)/2, my = (y1+y2)/2 - 20;
    html += `<path d="M${x1},${y1} Q${mx},${my} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="2" stroke-dasharray="${dashArray}" marker-end="${marker}"/>`;
    // Animated dot
    html += `<circle r="3" fill="${color.replace('.35','.7')}"><animateMotion dur="2s" repeatCount="indefinite" path="M${x1},${y1} Q${mx},${my} ${x2},${y2}"/></circle>`;
    // Hit area for clicking connection type
    html += `<path class="conn-hit" d="M${x1},${y1} Q${mx},${my} ${x2},${y2}" fill="none" stroke="transparent" stroke-width="14" pointer-events="stroke" style="cursor:pointer" onclick="cycleConnType('${conn.id}')"/>`;

    // If two-way, add reverse arrow
    if (conn.type === 'two') {
      html += `<path d="M${x2},${y2} Q${mx},${my+40} ${x1},${y1}" fill="none" stroke="rgba(45,212,160,.2)" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrowTwo)"/>`;
    }
  });

  // Drawing line while connecting
  if (connectFrom && connectMode) {
    const from = nodes.find(n => n.id === connectFrom);
    if (from) {
      html += `<line x1="${from.x+36}" y1="${from.y+40}" x2="${from.x+36}" y2="${from.y+40}" stroke="rgba(245,166,35,.3)" stroke-width="2" stroke-dasharray="4 4" id="tempLine"/>`;
    }
  }

  svg.innerHTML = html;
}

function cycleConnType(connId) {
  const conn = connections.find(c => c.id === connId);
  if (!conn) return;
  const types = ['one','two','continuous'];
  const idx = types.indexOf(conn.type);
  conn.type = types[(idx+1)%types.length];
  renderConnections();
  if (selectedNodeId) showNodeDetails(selectedNodeId);
}

// ================================================================
// SELECT NODE & SHOW DETAILS
// ================================================================
function selectNode(nodeId) {
  selectedNodeId = nodeId;
  canvasWrap.querySelectorAll('.c-node').forEach(el => el.classList.toggle('selected', el.id === nodeId));
  showNodeDetails(nodeId);
}

  const load = def.load + (node.model === 'haiku' ? 10 : node.model === 'opus' ? -15 : 0);
  const loadColor = load >= 80 ? 'var(--red)' : load >= 55 ? 'var(--amber)' : 'var(--teal)';
  const loadWarn = load >= 80 ? '<br><span style="color:var(--red)">\u26A0 BOTTLENECK - zmien model na Opus lub podziel agenta</span>' : '';

  let html = `
    <div class="det-card"><h4>${def.icon} ${def.name}</h4><p>${def.role}</p></div>

    <div class="det-section"><div class="det-label">NARZEDZIA</div><div class="det-value" style="font-size:11px">${def.tools}</div></div>

    <div class="det-section"><div class="det-label">MODEL</div>
      <div class="det-models">
        <div class="det-model ${node.model==='opus'?'active act-opus':''}" onclick="changeModel('${nodeId}','opus')"><div class="det-model-name" style="color:var(--amber)">Opus</div><div class="det-model-cost">1M ctx / $$$</div></div>
        <div class="det-model ${node.model==='sonnet'?'active act-sonnet':''}" onclick="changeModel('${nodeId}','sonnet')"><div class="det-model-name" style="color:var(--teal)">Sonnet</div><div class="det-model-cost">200K ctx / $$</div></div>
        <div class="det-model ${node.model==='haiku'?'active act-haiku':''}" onclick="changeModel('${nodeId}','haiku')"><div class="det-model-name" style="color:var(--blue)">Haiku</div><div class="det-model-cost">200K ctx / $</div></div>

function showDefDetails(defId) {
  const def = AGENT_DEFS.find(d => d.id === defId);
  if (!def) return;
  let html = `
    <div class="det-card"><h4>${def.icon} ${def.name}</h4><p>${def.role}</p></div>
    <div class="det-section"><div class="det-label">NARZEDZIA</div><div class="det-value" style="font-size:11px">${def.tools}</div></div>
    <div class="det-section"><div class="det-label">DOMYSLNY MODEL</div><div class="det-value">${def.model.toUpperCase()}</div></div>
    <div class="det-section"><div class="det-label">DOMYSLNY PROMPT</div>
      <textarea class="det-prompt" readonly style="min-height:200px">${def.prompt}</textarea>
    </div>
    <div style="margin-top:10px"><button class="btn btn-teal btn-big" onclick="addToCenter('${def.id}')" style="width:100%">+ Dodaj na canvas</button></div>`;
  document.getElementById('detailsScroll').innerHTML = html;
}

function addToCenter(defId) {
  const rect = canvasWrap.getBoundingClientRect();
  addNodeFromDef(defId, rect.width/2 - 36 + (Math.random()-.5)*100, rect.height/2 - 30 + (Math.random()-.5)*100);
}

function changeModel(nodeId, model) {
  const node = nodes.find(n => n.id === nodeId);
  if (node) {
    // Update model header in prompt
    const headerRe = /^\[MODEL:.*?\]\n\n/;
    if (node.customPrompt.match(headerRe)) {
      node.customPrompt = node.customPrompt.replace(headerRe, MODEL_INFO[model] + '\n\n');
    }
    node.model = model;
    renderNodes();
    selectNode(nodeId);
  }
}

function saveNodePrompt(nodeId) {
  const node = nodes.find(n => n.id === nodeId);
  const ta = document.getElementById('nodePrompt');
  if (node && ta) node.customPrompt = ta.value;
}

function deleteConn(connId) {
  connections = connections.filter(c => c.id !== connId);
  renderConnections();
  if (selectedNodeId) showNodeDetails(selectedNodeId);
  updateInfo();
}

function deleteSelected() {
  if (!selectedNodeId) return;
  nodes = nodes.filter(n => n.id !== selectedNodeId);
  connections = connections.filter(c => c.fromId !== selectedNodeId && c.toId !== selectedNodeId);
  selectedNodeId = null;
  renderNodes();
  document.getElementById('detailsScroll').innerHTML = '<div class="details-empty">Zaznacz agenta na canvasie.</div>';
  updateInfo();
}

function clearCanvas() {
  if (!confirm('Wyczysc caly canvas?')) return;
  nodes = []; connections = []; selectedNodeId = null; connectFrom = null; idCounter = 0; activePresetId = null;
  renderNodes(); updateInfo();
  document.getElementById('detailsScroll').innerHTML = '<div class="details-empty">Przeciagnij agentow z palety.</div>';
  highlightPresetBtn(null);
}

function updateInfo() {
  document.getElementById('canvasInfo').textContent = `Agentow: ${nodes.length} | Polaczen: ${connections.length}`;
}

// Ordered list for rendering buttons
const PRESET_ORDER = ['solo','recon','trio','reflect','content','plan_exec','startup','cascade','security','review','standard','research','saas','full','deep'];

// ================================================================
// RENDER PRESET BUTTONS
// ================================================================
function renderPresetButtons() {
  const section = document.getElementById('presetSection');
  let html = '<div class="preset-section-title"><span>PRESETY</span><span>' + PRESET_ORDER.length + '</span></div>';
  PRESET_ORDER.forEach(pid => {
    const meta = PRESET_META[pid];
    if (!meta) return;
    const costDots = meta.count <= 3 ? '$' : meta.count <= 6 ? '$$' : meta.count <= 10 ? '$$$' : '$$$$';
    html += `<button class="preset-btn" id="pbtn_${pid}" onclick="loadPreset('${pid}')" oncontextmenu="event.preventDefault();showPresetInfo('${pid}')">
      <span class="pb-icon">${meta.icon}</span>
      <span class="pb-name">${meta.name}</span>
      <span class="pb-meta">${meta.count} | ${costDots}</span>
    </button>`;
  });
  section.innerHTML = html;
}

function highlightPresetBtn(presetId) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (presetId) {
    const btn = document.getElementById('pbtn_' + presetId);
    if (btn) btn.classList.add('active');
  }
}

// ================================================================
// LOAD PRESET
// ================================================================
function loadPreset(presetId) {
  nodes = []; connections = []; selectedNodeId = null; idCounter = 0;
  activePresetId = presetId;
  const preset = PRESETS[presetId];
  if (!preset) return;

  preset.forEach(p => {
    const def = AGENT_DEFS.find(d => d.id === p.def);
    if (!def) return;
    const id = 'n' + (idCounter++);
    nodes.push({ id, defId: p.def, x: p.x, y: p.y, model: def.model, customPrompt: def.prompt });
  });

  const conns = PRESET_CONNS[presetId] || [];
  conns.forEach(c => {
    if (nodes[c[0]] && nodes[c[1]]) {
      connections.push({ id:'c'+(idCounter++), fromId:nodes[c[0]].id, toId:nodes[c[1]].id, type:c[2]||'one' });
    }
  });

  renderNodes();
  updateInfo();
  highlightPresetBtn(presetId);
  showPresetInfo(presetId);
}

// ================================================================
// SHOW PRESET INFO IN DETAILS PANEL
// ================================================================
function showPresetInfo(presetId) {
  const meta = PRESET_META[presetId];
  if (!meta) return;

  const prosHtml = meta.pros.map(p => `<li class="pi-pro">${p}</li>`).join('');
  const consHtml = meta.cons.map(c => `<li class="pi-con">${c}</li>`).join('');

  // Calculate model breakdown
  const preset = PRESETS[presetId] || [];
  const modelCounts = { opus:0, sonnet:0, haiku:0 };
  preset.forEach(p => {
    const def = AGENT_DEFS.find(d => d.id === p.def);
    if (def) modelCounts[def.model]++;
  });
  let modelHtml = '';
  if (modelCounts.opus > 0) modelHtml += `<span style="color:var(--amber)">${modelCounts.opus}x Opus</span> `;
  if (modelCounts.sonnet > 0) modelHtml += `<span style="color:var(--teal)">${modelCounts.sonnet}x Sonnet</span> `;
  if (modelCounts.haiku > 0) modelHtml += `<span style="color:var(--blue)">${modelCounts.haiku}x Haiku</span>`;

  let html = `
    <div class="det-card">
      <h4>${meta.icon} ${meta.name} <span style="font-size:11px;color:var(--t3);font-weight:400">(${meta.count} agentow)</span></h4>
      <p>${meta.desc}</p>
    </div>

    <div class="det-section">
      <div class="det-label">KIEDY UZYWAC</div>
      <div class="det-value" style="font-size:11px;line-height:1.5">${meta.useCase}</div>
    </div>

    <div class="det-section">
      <div class="det-label">WZORZEC ARCHITEKTONICZNY</div>
      <div class="pi-badge">${meta.pattern}</div>
    </div>

    <div class="det-section">
      <div class="det-label">ROZKLAD MODELI</div>
      <div style="font-family:var(--mn);font-size:11px;margin:4px 0">${modelHtml}</div>
    </div>

    <div class="det-section">
      <div class="det-label">SZACUNKOWY KOSZT</div>
      <div class="pi-cost-row">
        <div><div style="font-size:9px;color:var(--t3)">TOKENY</div><div class="pi-cost-val" style="color:var(--teal)">${meta.tokens}</div></div>
        <div><div style="font-size:9px;color:var(--t3)">USD (API)</div><div class="pi-cost-val" style="color:var(--amber)">${meta.costEst}</div></div>
      </div>
    </div>

    <div class="det-section">
      <div class="det-label">ZALETY</div>
      <ul class="pi-list">${prosHtml}</ul>
    </div>

    <div class="det-section">
      <div class="det-label">WADY / RYZYKA</div>
      <ul class="pi-list">${consHtml}</ul>
    </div>

    <div class="pi-hint">
      Kliknij agenta na canvasie aby zobaczyc szczegoly i edytowac prompt.<br>
      Kliknij linie polaczenia aby zmienic typ (\u2192 jedno \u2192 \u21C4 dwu \u2192 \u223C ciagle).<br>
      PPM na preset = pokaz opis bez ladowania.
    </div>`;

  document.getElementById('detailsScroll').innerHTML = html;
}

// ================================================================
// GENERATE FINAL PROMPT
// ================================================================
function generateFinalPrompt() {
  const problem = document.getElementById('problemInput').value.trim();
  if (nodes.length === 0) { alert('Dodaj agentow na canvas!'); return; }

  let prompt = `Jestes Master Orkiestratorem zespolu ${nodes.length} agentow AI.\n\n`;

  if (problem) {
    prompt += `## ZADANIE / PROBLEM\n${problem}\n\n`;
  } else {
    prompt += `## ZADANIE / PROBLEM\n[WPISZ OPIS PROJEKTU]\n\n`;
  }

  // Add preset info if loaded from preset
  if (activePresetId && PRESET_META[activePresetId]) {
    const meta = PRESET_META[activePresetId];
    prompt += `## KONFIGURACJA: ${meta.name} (${meta.pattern})\n`;
    prompt += `Szacunkowe zuzycie: ${meta.tokens} | ~${meta.costEst}\n\n`;
  }

  prompt += `## STRUKTURA ZESPOLU (${nodes.length} agentow)\n\n`;

  // Group by level (approximate from Y position)
  const sorted = [...nodes].sort((a,b) => a.y - b.y);
  sorted.forEach((node, i) => {
    const def = AGENT_DEFS.find(d => d.id === node.defId);
    if (!def) return;
    const outConns = connections.filter(c => c.fromId === node.id);
    const inConns = connections.filter(c => c.toId === node.id);
    const outNames = outConns.map(c => { const t=nodes.find(n=>n.id===c.toId); const td=t?AGENT_DEFS.find(d=>d.id===t.defId):null; return td?td.name:'?'; });
    const inNames = inConns.map(c => { const s=nodes.find(n=>n.id===c.fromId); const sd=s?AGENT_DEFS.find(d=>d.id===s.defId):null; return sd?sd.name:'?'; });

    prompt += `### Agent ${i+1}: ${def.name} [${node.model.toUpperCase()}]\n`;
    prompt += `Rola: ${def.role}\n`;
    if (inNames.length) prompt += `Odbiera od: ${inNames.join(', ')}\n`;
    if (outNames.length) prompt += `Wysyla do: ${outNames.join(', ')}\n`;
    prompt += `\nPrompt:\n"""\n${node.customPrompt}\n"""\n\n`;
  });

  prompt += `## ZASADY OGOLNE\n`;
  prompt += `- Kazdy agent dostaje TYLKO swoj kontekst (zasada waskiego kontekstu)\n`;
  prompt += `- MANIFEST.md jako shared scratchpad\n`;
  prompt += `- Gate'y miedzy fazami - nie przechodz dalej bez zatwierdzenia\n`;
  prompt += `- Max 10 krokow sekwencyjnych\n`;
  prompt += `- Smart model routing: Opus=strategia, Sonnet=implementacja, Haiku=research/QA\n\n`;

  prompt += `## KOLEJNOSC URUCHAMIANIA\n`;
  prompt += `Uruchom agentow w kolejnosci od gory do dolu. Agentow na tym samym poziomie uruchom ROWNOLEGLE.\n`;
  prompt += `Po kazdej fazie sprawdz wyniki przed przejsciem dalej.\n`;

  document.getElementById('finalPromptArea').value = prompt;
  document.getElementById('modalOverlay').classList.add('show');
}

function copyFinalPrompt() {
  const ta = document.getElementById('finalPromptArea');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = event.target;
    btn.textContent = '\u2705 Skopiowano!';
    setTimeout(() => btn.textContent = '\uD83D\uDCCB Kopiuj do schowka', 2000);
  });
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// ================================================================
// SAVE / LOAD CASES
// ================================================================
function saveCase() {
  const name = prompt('Nazwa case\'u:') || 'Case ' + new Date().toLocaleString('pl-PL');
  const data = {
    name, nodes: JSON.parse(JSON.stringify(nodes)),
    connections: JSON.parse(JSON.stringify(connections)),
    problem: document.getElementById('problemInput').value,
    idCounter, timestamp: new Date().toISOString()
  };
  const cases = JSON.parse(localStorage.getItem('agentCases') || '[]');
  cases.push(data);
  localStorage.setItem('agentCases', JSON.stringify(cases));
  alert('Zapisano: ' + name);
}

renderPresetButtons();
loadPreset('recon');
